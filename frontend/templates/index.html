<script>
const form = document.getElementById('promptForm');
const input = document.getElementById('promptInput');
const chatArea = document.getElementById('chatArea');
const newChatBtn = document.getElementById('newChatBtn');
const chatTitle = document.getElementById('chatTitle');
let currentChatId = {{ active_chat.id|tojson }};

function addMessage(role, author, time, content) {
    const row = document.createElement('article');
    row.className = `message-row ${role}`;
    row.innerHTML = `
        <div class="avatar">${role === 'assistant' ? 'GD' : 'TÚ'}</div>
        <div class="message-card">
            <div class="message-meta">
                <span>${author}</span>
                <time>${time}</time>
            </div>
            <p></p>
        </div>
    `;
    row.querySelector('p').textContent = content;
    chatArea.appendChild(row);
    chatArea.scrollTop = chatArea.scrollHeight;
    return row;
}

function updateMessage(row, content, time = 'Ahora') {
    const p = row.querySelector('p');
    const timeEl = row.querySelector('time');
    if (p) p.textContent = content;
    if (timeEl) timeEl.textContent = time;
    chatArea.scrollTop = chatArea.scrollHeight;
}

function autoResize(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 180) + 'px';
}

function getStageLabel(stage) {
    const labels = {
        inicio: 'Iniciando proceso',
        llm_sql: 'Generando consulta SQL',
        db: 'Consultando base de datos',
        correccion: 'Corrigiendo consulta',
        datos: 'Procesando datos',
        respuesta_final: 'Generando respuesta final',
        fin: 'Proceso completado',
        error: 'Error'
    };
    return labels[stage] || 'Procesando';
}

function parseSSEChunk(chunk) {
    const events = [];
    const parts = chunk.split('\n\n');

    for (const part of parts) {
        const trimmed = part.trim();
        if (!trimmed) continue;

        const lines = trimmed.split('\n');
        let dataLine = '';

        for (const line of lines) {
            if (line.startsWith('data:')) {
                dataLine += line.slice(5).trim();
            }
        }

        if (dataLine) {
            try {
                events.push(JSON.parse(dataLine));
            } catch (e) {
                console.error('No se pudo parsear evento SSE:', dataLine, e);
            }
        }
    }

    return events;
}

input.addEventListener('input', () => autoResize(input));

newChatBtn.addEventListener('click', async () => {
    const res = await fetch('/api/chats', { method: 'POST' });
    const data = await res.json();
    if (!data.ok) return;
    window.location.href = `/?chat_id=${data.chat.id}`;
});

form.addEventListener('submit', async (e) => {
    e.preventDefault();
    const prompt = input.value.trim();
    if (!prompt) return;

    addMessage('user', 'Usuario', 'Ahora', prompt);
    input.value = '';
    autoResize(input);

    const assistantRow = addMessage(
        'assistant',
        'Asistente Danec',
        'Ahora',
        'Iniciando proceso...'
    );

    try {
        const res = await fetch(`/api/chats/${currentChatId}/message`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ prompt })
        });

        if (!res.ok) {
            updateMessage(
                assistantRow,
                `Error del servidor: ${res.status} ${res.statusText}`
            );
            return;
        }

        const contentType = res.headers.get('content-type') || '';

        if (!contentType.includes('text/event-stream')) {
            const data = await res.json();

            if (!data.ok) {
                updateMessage(
                    assistantRow,
                    data.error || 'Ocurrió un error.'
                );
                return;
            }

            chatTitle.textContent = data.chat?.title || chatTitle.textContent;
            updateMessage(
                assistantRow,
                data.assistant_message?.content || 'Sin respuesta del backend.',
                data.assistant_message?.time || 'Ahora'
            );
            return;
        }

        const reader = res.body.getReader();
        const decoder = new TextDecoder('utf-8');
        let buffer = '';
        let finalResult = null;

        while (true) {
            const { value, done } = await reader.read();
            if (done) break;

            buffer += decoder.decode(value, { stream: true });

            const completeParts = buffer.split('\n\n');
            buffer = completeParts.pop() || '';

            for (const part of completeParts) {
                const events = parseSSEChunk(part + '\n\n');

                for (const event of events) {
                    const stage = event.stage || 'proceso';
                    const stageLabel = getStageLabel(stage);
                    const message = event.message || stageLabel;

                    if (event.resultado) {
                        finalResult = event.resultado;
                    }

                    if (stage === 'fin') {
                        updateMessage(
                            assistantRow,
                            finalResult || event.resultado || message,
                            'Ahora'
                        );
                    } else if (stage === 'error') {
                        updateMessage(
                            assistantRow,
                            `Error: ${message}`,
                            'Ahora'
                        );
                    } else {
                        updateMessage(
                            assistantRow,
                            `${stageLabel}...\n${message}`,
                            'Ahora'
                        );
                    }
                }
            }
        }

        if (buffer.trim()) {
            const events = parseSSEChunk(buffer);
            for (const event of events) {
                if (event.stage === 'fin') {
                    updateMessage(
                        assistantRow,
                        event.resultado || event.message || 'Proceso completado',
                        'Ahora'
                    );
                }
            }
        }

    } catch (error) {
        updateMessage(
            assistantRow,
            'No fue posible conectar con el frontend o backend.'
        );
        console.error(error);
    }
});
</script>
